global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # INKSPOT App — métriques custom via /api/metrics
  # En local Docker : app:3000
  # Sur Railway : INKSPOT-5z.railway.internal:3000 (remplacer par l'URL interne Railway)
  - job_name: 'inkspot-app'
    static_configs:
      - targets: ['${INKSPOT_INTERNAL_HOST:-inkspot-app:3000}']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # PostgreSQL Exporter
  # Sur Railway : postgres-exporter.railway.internal:9187
  - job_name: 'postgres'
    static_configs:
      - targets: ['${POSTGRES_EXPORTER_HOST:-postgres-exporter:9187}']
    scrape_interval: 30s

  # Node Exporter (métriques système)
  - job_name: 'node'
    static_configs:
      - targets: ['${NODE_EXPORTER_HOST:-node-exporter:9100}']
    scrape_interval: 30s
